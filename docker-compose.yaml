services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # Port exposed publicly
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gas_api
    restart: unless-stopped
    environment:
      PORT:        3001
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${POSTGRES_DB}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
    expose:
      - "3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Vite build → nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gas_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  # ── pgAdmin — internal access only via SSH tunnel ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    # Bound to localhost only — NOT accessible from public internet
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
